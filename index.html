  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js" defer></script>

  <script>
    (function () {
      var preloader = document.getElementById('preloader');
      var landing = document.querySelector('.landing');
      if (!preloader) return;

      // Skip preloader if fonts are already cached
      var fontsLoaded = document.fonts.check('900 1em Roboto') && document.fonts.check('700 1em Roboto');
      if (fontsLoaded) {
        preloader.classList.add('preloader-done');
        landing.classList.remove('preloader-hidden');
        landing.classList.add('preloader-ready');
        preloader.remove();
        return;
      }

      var minTime = new Promise(function (r) { setTimeout(r, 800); });
      var fontsReady = document.fonts.ready;

      Promise.all([minTime, fontsReady]).then(function () {
        preloader.classList.add('preloader-done');
        landing.classList.add('preloader-ready');
        preloader.addEventListener('transitionend', function () {
          preloader.remove();
        }, { once: true });
        setTimeout(function () { if (preloader.parentNode) preloader.remove(); }, 1000);
      });

      // Hard fallback
      setTimeout(function () {
        if (preloader.parentNode) {
          preloader.classList.add('preloader-done');
          landing.classList.add('preloader-ready');
          setTimeout(function () { if (preloader.parentNode) preloader.remove(); }, 500);
        }
      }, 1500);
    })();
  </script>

  <script>
    (() => {
      if (matchMedia('(pointer: coarse)').matches) return;

      const els = document.querySelectorAll('.cursor-repel');
      let mx = -9999, my = -9999;
      let raf;

      const state = new Map();
      els.forEach(el => {
        const isOverlay = el.classList.contains('kanji');
        state.set(el, { x: 0, y: 0, overlay: isOverlay });
      });

      function update() {
        els.forEach(el => {
          const rect = el.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          const dx = cx - mx;
          const dy = cy - my;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const strength = parseFloat(el.dataset.repelStrength) || 10;
          const radius = strength * 10;
          const s = state.get(el);

          let tx = 0, ty = 0;
          if (dist < radius && dist > 0) {
            const force = (1 - dist / radius) ** 2;
            tx = (dx / dist) * force * strength;
            ty = (dy / dist) * force * strength;
          }

          s.x += (tx - s.x) * 0.12;
          s.y += (ty - s.y) * 0.12;

          if (Math.abs(s.x) < 0.05 && Math.abs(s.y) < 0.05) {
            s.x = 0; s.y = 0;
          }

          // Overlay kanji has a base translate(-50%, -50%) for centering
          if (s.overlay) {
            el.style.transform = `translate(calc(-50% + ${s.x}px), calc(-50% + ${s.y}px))`;
          } else {
            el.style.transform = `translate(${s.x}px, ${s.y}px)`;
          }
        });
        raf = requestAnimationFrame(update);
      }

      let idle;
      function startLoop() {
        clearTimeout(idle);
        if (!raf) raf = requestAnimationFrame(update);
        idle = setTimeout(() => { cancelAnimationFrame(raf); raf = null; }, 1000);
      }

      document.addEventListener('mousemove', e => {
        mx = e.clientX;
        my = e.clientY;
        startLoop();
      });

      document.body.addEventListener('mouseleave', () => {
        mx = -9999;
        my = -9999;
      });
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function () {});
    }
  </script>

  <script>
    (function () {
      /* ── Announcement config — edit these to change content, or set ENABLED to false ── */
      var ANNOUNCE_ENABLED = true;
      var ANNOUNCE_TEXT    = "We\u2019re playing at P60 in Amstelveen on March 19th!";
      var ANNOUNCE_BTN    = "GET TICKETS";
      var ANNOUNCE_LINK   = "https://p60.nl/2026/goodnight-lavender/";
      var ANNOUNCE_KEY    = "gl_announce_p60";
      /* ──────────────────────────────────────────────────────────────────────────── */

      if (!ANNOUNCE_ENABLED) return;
      if (localStorage.getItem(ANNOUNCE_KEY)) return;

      var bar     = document.getElementById('announce');
      var textEl  = document.getElementById('announce-text');
      var ctaEl   = document.getElementById('announce-cta');
      var closeEl = document.getElementById('announce-close');
      if (!bar) return;

      textEl.textContent = ANNOUNCE_TEXT;
      ctaEl.textContent  = ANNOUNCE_BTN;
      ctaEl.href         = ANNOUNCE_LINK;

      var landing = document.querySelector('.landing');

      function show() {
        bar.removeAttribute('hidden');
        requestAnimationFrame(function () {
          bar.classList.add('announce-visible');
          if (landing) landing.classList.add('announce-active');
        });
      }

      function dismiss() {
        localStorage.setItem(ANNOUNCE_KEY, '1');
        bar.classList.remove('announce-visible');
        if (landing) landing.classList.remove('announce-active');
        bar.addEventListener('transitionend', function () {
          bar.setAttribute('hidden', '');
        }, { once: true });
        setTimeout(function () { bar.setAttribute('hidden', ''); }, 500);
      }

      closeEl.addEventListener('click', dismiss);
      ctaEl.addEventListener('click', function () {
        localStorage.setItem(ANNOUNCE_KEY, '1');
      });

      setTimeout(show, 1800);
    })();
  </script>
