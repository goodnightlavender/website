  <script>
    (() => {
      const els = document.querySelectorAll('.cursor-repel');
      let mx = -9999, my = -9999;
      let raf;

      const state = new Map();
      els.forEach(el => {
        const isOverlay = el.classList.contains('kanji');
        state.set(el, { x: 0, y: 0, overlay: isOverlay });
      });

      function update() {
        els.forEach(el => {
          const rect = el.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          const dx = cx - mx;
          const dy = cy - my;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const strength = parseFloat(el.dataset.repelStrength) || 10;
          const radius = strength * 10;
          const s = state.get(el);

          let tx = 0, ty = 0;
          if (dist < radius && dist > 0) {
            const force = (1 - dist / radius) ** 2;
            tx = (dx / dist) * force * strength;
            ty = (dy / dist) * force * strength;
          }

          s.x += (tx - s.x) * 0.12;
          s.y += (ty - s.y) * 0.12;

          if (Math.abs(s.x) < 0.05 && Math.abs(s.y) < 0.05) {
            s.x = 0; s.y = 0;
          }

          // Overlay kanji has a base translate(-50%, -50%) for centering
          if (s.overlay) {
            el.style.transform = `translate(calc(-50% + ${s.x}px), calc(-50% + ${s.y}px))`;
          } else {
            el.style.transform = `translate(${s.x}px, ${s.y}px)`;
          }
        });
        raf = requestAnimationFrame(update);
      }

      document.addEventListener('mousemove', e => {
        mx = e.clientX;
        my = e.clientY;
      });

      document.body.addEventListener('mouseleave', () => {
        mx = -9999;
        my = -9999;
      });

      raf = requestAnimationFrame(update);
    })();
  </script>
